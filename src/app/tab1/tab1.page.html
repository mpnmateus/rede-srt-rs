<ion-header>
  <ion-toolbar>
    <ion-title>Rede SRT RS</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">
  <h1>Serviços Residenciais Terapêuticos</h1>
  <p>Lista de SRTs cadastradas.</p>

  <button type="button" (click)="openNovo()">Novo SRT</button>

  <div style="margin-top: 24px;">
    <button
      *ngFor="let srt of srts"
      type="button"
      (click)="openDetail(srt.id)"
      style="display:block; width:100%; margin-bottom:12px; padding:16px; text-align:left;"
    >
      <strong>{{ srt.nome }}</strong><br />
      {{ srt.cidade }}<br />
      Vagas: {{ srt.vagasDisponiveis }}
    </button>
  </div>
</ion-content>

<footer class="bottom-nav">
  <a routerLink="/srts">SRTs</a>
  <a routerLink="/novo">Cadastrar</a>
  <a routerLink="/sobre">Sobre</a>
</footer>
