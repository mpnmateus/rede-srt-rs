<ion-header class="ion-no-border">
  <ion-toolbar>
    <ion-title>Rede SRT RS</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true">
  <div class="home-container">
    <section class="hero">
      <h1>Serviços Residenciais Terapêuticos</h1>
      <p>
        Gerencie e monitore a rede estadual de saúde mental com transparência
        e cuidado humanizado.
      </p>
    </section>

    <section class="search-box">
      <input
        type="text"
        placeholder="Buscar por nome ou município..."
        [(ngModel)]="busca"
        (input)="aplicarFiltros()"
      />
    </section>

    <section class="filters">
      <button
        class="filter-btn active"
        type="button"
        (click)="toggleFiltros()"
      >
        Cidade
      </button>

      <button
        class="filter-btn"
        type="button"
        (click)="toggleFiltros()"
      >
        Tipo
      </button>

      <button
        class="filter-btn"
        type="button"
        (click)="toggleFiltros()"
      >
        Gênero
      </button>
    </section>

    <section class="filter-panel" *ngIf="painelFiltrosAberto">
      <div class="field-group">
        <label for="cidadeFiltro">Cidade</label>
        <select
          id="cidadeFiltro"
          [(ngModel)]="filtroCidade"
          (change)="aplicarFiltros()"
        >
          <option value="">Todas</option>
          <option *ngFor="let cidade of cidadesDisponiveis" [value]="cidade">
            {{ cidade }}
          </option>
        </select>
      </div>

      <div class="field-group">
        <label for="tipoFiltro">Tipo</label>
        <select
          id="tipoFiltro"
          [(ngModel)]="filtroTipo"
          (change)="aplicarFiltros()"
        >
          <option value="">Todos</option>
          <option value="tipo1">Tipo 1</option>
          <option value="tipo2">Tipo 2</option>
        </select>
      </div>

      <div class="field-group">
        <label for="generoFiltro">Gênero</label>
        <select
          id="generoFiltro"
          [(ngModel)]="filtroGenero"
          (change)="aplicarFiltros()"
        >
          <option value="">Todos</option>
          <option value="misto">Misto</option>
          <option value="masculino">Masculino</option>
          <option value="feminino">Feminino</option>
        </select>
      </div>

      <button type="button" class="clear-btn" (click)="limparFiltros()">
        Limpar filtros
      </button>
    </section>

    <section class="result-summary">
      <span>{{ srtsFiltradas.length }} resultado(s)</span>
    </section>

    <section class="srt-list">
      <button
        *ngFor="let srt of srtsFiltradas"
        type="button"
        class="srt-card"
        (click)="openDetail(srt.id)"
      >
        <div class="card-top">
          <span class="badge tipo">{{ srt.tipo }}</span>

          <span
            class="badge vagas"
            [class.sem-vagas]="srt.vagasDisponiveis === 0"
          >
            {{
              srt.vagasDisponiveis === 1
                ? '1 vaga livre'
                : srt.vagasDisponiveis + ' vagas livres'
            }}
          </span>
        </div>

        <div class="card-body">
          <h2>{{ srt.nome }}</h2>
          <p class="cidade">{{ srt.cidade }}</p>
        </div>

        <div class="card-footer">
          <span class="genero">{{ srt.genero }}</span>
          <span class="arrow">→</span>
        </div>
      </button>

      <div class="empty-state" *ngIf="srtsFiltradas.length === 0">
        Nenhuma SRT encontrada com os filtros aplicados.
      </div>
    </section>

    <button type="button" class="fab-add" (click)="openNovo()">+</button>
  </div>
</ion-content>

<footer class="bottom-nav">
  <a routerLink="/srts">Início</a>
  <a routerLink="/novo">Novo SRT</a>
  <a routerLink="/sobre">Perfil</a>
</footer>
